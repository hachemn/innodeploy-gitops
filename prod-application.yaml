apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: innodeploy-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hachemn/innodeploy-gitops.git
    targetRevision: main
    path: apps/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true

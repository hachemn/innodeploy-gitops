apiVersion: apps/v1
kind: Deployment
metadata:
  name: innodeploy-app
  labels:
    app: innodeploy-app
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=nourhenhachem/innodeploy-app
    argocd-image-updater.argoproj.io/app.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git

spec:
  replicas: 1

  selector:
    matchLabels:
      app: innodeploy-app

  template:
    metadata:
      labels:
        app: innodeploy-app

    spec:
      containers:
        - name: innodeploy-app
          image: nourhenhachem/innodeploy-app:v1778018996
          ports:
            - containerPort: 3000

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hachemn/innodeploy-gitops.git
    targetRevision: main
    path: helm/innodeploy-chart

    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: helm-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: helm-innodeploy
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hachemn/innodeploy-gitops.git
    targetRevision: main
    path: helm/innodeploy-chart

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: helm-argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

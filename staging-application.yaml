apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: innodeploy-staging
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hachemn/innodeploy-gitops.git
    targetRevision: main
    path: apps/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

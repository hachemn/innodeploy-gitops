apiVersion: v1
kind: Service
metadata:
  name: innodeploy-app
  labels:
    app: innodeploy-app
    app.kubernetes.io/name: innodeploy-chart   # added: ServiceMonitor selector matches this
spec:
  selector:
    app: innodeploy-app
  ports:
    - port: 3000
      targetPort: 3000
      name: http                               # name must match ServiceMonitor endpoint port
  type: NodePort
